        icon_color: '#88c0d0'
        tap_action:
          action: more-info
        card_mod:
          style: |2

            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
              color: #d8dee9;
            }

            ha-card { padding: 4px 0 !important; text-align: left; }
