# SGCC Home Assistant Bridge - 当前自用 Lovelace 卡片示例
# 来源：真实 Home Assistant 页面 /sgcc-electricity/overview
# 依赖 HACS / 自定义卡片：stack-in-card、mushroom、apexcharts-card、card-mod。
# 背景图 /local/sgcc/bg-nord-blur.jpg 可按需替换或删除。
# 示例账户键为 `0123_e2161a7e19`；在 Home Assistant 中确认本次生成的完整实体 ID，并整体替换该账户键。

title: 国网电费
path: overview
icon: mdi:transmission-tower
type: sections
max_columns: 2
dense_section_placement: true
background: linear-gradient(180deg, rgba(6,12,26,0.55) 0%, rgba(5,10,22,0.68) 58%, rgba(3,7,16,0.80) 100%),url('/local/sgcc/bg-nord-blur.jpg') center/cover no-repeat
sections:
- type: grid
  cards:
  - type: custom:stack-in-card
    mode: vertical
    cards:
    - type: custom:mushroom-template-card
      primary: 国网电费 · 用电监控
      secondary: 户号 ****0123 · 更新至 {{ state_attr('sensor.sgcc_0123_e2161a7e19_history','latest_daily_date') or state_attr('sensor.sgcc_0123_e2161a7e19_last_daily_usage','date') }}
      icon: mdi:transmission-tower
      icon_color: '#88c0d0'
      multiline_secondary: true
      tap_action:
        action: none
      card_mod:
        style: |2

          ha-card {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
            color: #d8dee9;
          }

          ha-card { padding: 0 2px 10px !important; }
          mushroom-shape-icon { --shape-color: rgba(136,192,208,0.12) !important; }
          :host { --card-primary-font-size: 19px; --card-primary-font-weight: 760; --card-secondary-font-size: 12px; }
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-template-card
