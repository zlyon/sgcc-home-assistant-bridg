    - type: custom:apexcharts-card
      header:
        show: true
        title: 本月日用电
        show_states: false
      apex_config:
        chart:
          height: 148
          background: transparent
          fontFamily: inherit
          toolbar:
            show: false
          parentHeightOffset: 0
          animations:
            enabled: true
            easing: easeinout
            speed: 550
        theme:
          mode: dark
        grid:
          borderColor: rgba(143,188,187,0.10)
          strokeDashArray: 4
          padding:
            left: 2
            right: 6
            top: 0
            bottom: 0
        legend:
          show: false
          labels:
            colors: '#d8dee9'
        tooltip:
          theme: dark
          x:
            format: yyyy年M月d日
        dataLabels:
          enabled: false
        yaxis:
          decimalsInFloat: 1
          labels:
            style:
              colors: '#8792a6'
        xaxis:
          tooltip:
            enabled: false
          labels:
            style:
              colors: '#8792a6'
        stroke:
          curve: smooth
          width: 3
        fill:
          type: gradient
          gradient:
            opacityFrom: 0.38
            opacityTo: 0.02
        markers:
          size: 3
          strokeWidth: 0
      series:
      - entity: sensor.sgcc_0123_e2161a7e19_history
        name: 日用电
        type: area
        unit: ' kWh'
        color: '#88c0d0'
        data_generator: const ym=(entity.attributes.latest_daily_date||'').slice(0,7);const r=(entity.attributes.daily||[]).filter(x=>x.date&&x.date.slice(0,7)===ym);return r.map(x=>[new Date(x.date).getTime(),Number(x.usage_kwh||0)]).sort((a,b)=>a[0]-b[0]);
        extend_to: false
      card_mod:
        style: |2

          ha-card {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
            color: #d8dee9;
          }
          ha-card { padding: 0 !important; }
          .apexcharts-tooltip,
          .apexcharts-tooltip.apexcharts-theme-light,
          .apexcharts-tooltip.apexcharts-theme-dark {
            background: rgba(8,14,28,0.92) !important;
            border: 1px solid rgba(136,192,208,0.25) !important;
            color: #d8dee9 !important;
            border-radius: 12px !important;
            box-shadow: 0 14px 34px rgba(0,0,0,0.42), inset 0 1px 0 rgba(236,239,244,0.08) !important;
            backdrop-filter: blur(14px) saturate(1.2) !important;
            -webkit-backdrop-filter: blur(14px) saturate(1.2) !important;
            overflow: hidden !important;
          }
          .apexcharts-tooltip-title {
            background: rgba(14,22,42,0.95) !important;
            border-bottom: 1px solid rgba(136,192,208,0.18) !important;
            color: #88c0d0 !important;
