              --card-primary-font-size: 32px;
              --card-primary-font-weight: 780;
              --card-secondary-font-size: 12px;
              --card-secondary-font-weight: 560;
              --primary-text-color: #d8dee9;
              --secondary-text-color: #8792a6;
            }
            mushroom-shape-icon { --shape-color: rgba(136,192,208,0.10) !important; }
