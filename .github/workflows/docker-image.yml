name: CI and Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'sgcc_ha_bridge/**'
      - 'scripts/**'
      - 'tests/**'
      - 'tools/**'
      - 'Dockerfile-for-github-action'
      - 'Dockerfile.browser'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'example.env'
      - 'config.yaml'
      - 'repository.yaml'
      - 'ha_addons_doc/**'
      - '.github/workflows/docker-image.yml'
  pull_request:
    paths:
      - 'sgcc_ha_bridge/**'
      - 'scripts/**'
      - 'tests/**'
      - 'tools/**'
      - 'Dockerfile-for-github-action'
      - 'Dockerfile.browser'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'example.env'
      - 'config.yaml'
      - 'repository.yaml'
      - 'ha_addons_doc/**'
      - '.github/workflows/docker-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    env:
      HAS_ALIYUN_SECRETS: ${{ secrets.ALIYUN_REGISTRY != '' && secrets.ALIYUN_USERNAME != '' && secrets.ALIYUN_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        run: |
          echo "GHCR_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sgcc-home-assistant-bridge" >> "$GITHUB_ENV"
          echo "GHCR_BROWSER_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sgcc-home-assistant-bridge-browser" >> "$GITHUB_ENV"
          echo "ALIYUN_IMAGE_NAME=crpi-uqxz2jxgnrieto82.cn-hangzhou.personal.cr.aliyuncs.com/maribelhearm/sgcc_ha" >> "$GITHUB_ENV"
          echo "ALIYUN_BROWSER_IMAGE_NAME=crpi-uqxz2jxgnrieto82.cn-hangzhou.personal.cr.aliyuncs.com/maribelhearm/sgcc_ha" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GHCR Docker metadata
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-for-github-action
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}

      - name: Extract GHCR browser Docker metadata
        id: meta-ghcr-browser
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_BROWSER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build GHCR browser image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.browser
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr-browser.outputs.tags }}
          labels: ${{ steps.meta-ghcr-browser.outputs.labels }}

      - name: Log in to Aliyun ACR
        if: github.event_name != 'pull_request' && env.HAS_ALIYUN_SECRETS == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract Aliyun ACR Docker metadata
        if: github.event_name != 'pull_request' && env.HAS_ALIYUN_SECRETS == 'true'
        id: meta-aliyun
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIYUN_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Aliyun ACR image
        if: github.event_name != 'pull_request' && env.HAS_ALIYUN_SECRETS == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-for-github-action
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          push: true
          tags: ${{ steps.meta-aliyun.outputs.tags }}
          labels: ${{ steps.meta-aliyun.outputs.labels }}

      - name: Extract Aliyun ACR browser Docker metadata
        if: github.event_name != 'pull_request' && env.HAS_ALIYUN_SECRETS == 'true'
        id: meta-aliyun-browser
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIYUN_BROWSER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=browser-
            type=ref,event=tag,prefix=browser-
            type=sha,prefix=browser-sha-
            type=raw,value=browser-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Aliyun ACR browser image
        if: github.event_name != 'pull_request' && env.HAS_ALIYUN_SECRETS == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.browser
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-aliyun-browser.outputs.tags }}
          labels: ${{ steps.meta-aliyun-browser.outputs.labels }}
