name: 同步上游仓库代码 触发阿里云ACR自动构建
permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_fork:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    steps:
      - name: Sync upstream changes
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: ${{ secrets.UPSTREAM_REPO }}
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GH_PAT }}
          test_mode: false

      - name: 同步失败告警
        if: failure()
        run: |
          echo "[Error] 同步失败，错误码128代表Git认证失败"
          echo "排查方向：1. GH_PAT令牌完整勾选repo权限；2. UPSTREAM_REPO仓库地址拼写正确；3. Token未过期"
          exit 1
