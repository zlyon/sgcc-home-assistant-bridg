name: Bug 反馈 / 使用问题
description: 国网登录、验证码、数据抓取、MQTT、Home Assistant 实体等问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先确认：日志、截图、配置里不要包含手机号、密码、户号全量、HA Token、LLM API Key、MQTT 密码等敏感信息。
        金额/余额/预付费/欠费/账单金额问题优先提供结构化诊断日志，不需要贴网页 HTML 或让 AI 分析页面源码。
        同一个 issue 里如果有多位用户补充，请分别说明自己的省份、用电/计费类型和诊断日志；不同省份或不同页面字段可能不是同一个问题。

  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - Docker Compose / Docker CLI
        - Home Assistant Add-on
        - Home Assistant Container 外部容器
        - 其他
    validations:
      required: true

  - type: input
    id: project_version
    attributes:
      label: 项目版本 / 镜像 tag
      description: 例如 latest、main、sha-xxxxxxx、v0.1.4；如果不确定，请贴启动日志里的版本行。
      placeholder: latest
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant 版本与安装方式
      placeholder: Core 2026.6.3 / HAOS 18.0 / Container 等
    validations:
      required: false

  - type: dropdown
    id: problem_type
    attributes:
      label: 问题类型
      options:
        - 国网登录失败
        - 验证码 / LLM 识别失败
        - RK001 / 风控 / 页面打不开
        - 金额 / 余额 / 预付费 / 欠费字段解析
        - 数据缺失或数据不更新
        - 日 / 月 / 年用电量字段解析
        - MQTT Discovery / HA 实体问题
        - Home Assistant Add-on 安装或启动问题
        - Docker 镜像 / 国内镜像问题
        - 其他
    validations:
      required: true

  - type: input
    id: province_account_type
    attributes:
      label: 省份与用电 / 计费类型
      description: 不需要完整地址或完整户号；金额字段常按省份、预付费、出账后缴费、居民/工商业等口径变化。
      placeholder: 例如：福建 / 居民 / 预付费；或 浙江 / 居民 / 出账后缴费
    validations:
      required: false

  - type: dropdown
    id: publisher
    attributes:
      label: PUBLISHER 配置
      options:
        - both
        - mqtt
        - rest
        - 不确定 / 未配置
    validations:
      required: true

  - type: dropdown
    id: browser_mode
    attributes:
      label: SGCC_BROWSER_MODE
      options:
        - browser-service
        - local
        - host-cdp / cdp
        - 不确定 / 未配置
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 你期望发生什么？
      description: 简单说你想看到的结果。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际发生了什么？
      description: 包括页面、实体、日志里的关键现象。请脱敏。
    validations:
      required: true

  - type: textarea
    id: data_scope
    attributes:
      label: 数据范围与人工对照
      description: 如果是数据缺失或金额不一致，请逐项说明网页显示、程序显示和最新时间；金额类问题请保留“当前余额、预付费余额、应交/欠费、出账金额、上期/上月余额”的区别。
      placeholder: |
        网页入口：95598 / 网上国网；页面名称：账户余额 / 电费账单 / 日用电量 / 月用电量 / 其他
        当前账户余额：网页显示 xx 元，程序 balance 显示 xx/None
        预付费余额：有/无，HA/MQTT 显示 xx/None
        应交金额/欠费：网页显示 xx 元，程序 arrears 显示 xx/None
        出账金额/本期电费：网页显示 xx 元，程序显示 xx/None
        上期/上月余额：网页显示 xx 元，程序 prepay_balance/balance 显示 xx/None
        截至时间 / 查询时间：2026-xx-xx xx:xx:xx
        日用电：最新到 2026-xx-xx
        月度：最新到 2026-xx
        年度：有/无
        峰平谷尖：有/无
    validations:
      required: false

  - type: textarea
    id: money_diag
    attributes:
      label: 金额/余额诊断日志
      description: 如果问题涉及余额、预付费、欠费、应交金额、出账金额或上月余额，请开启 SGCC_MONEY_DIAG=true 后贴同一次抓取里的 Path B 金额诊断摘要和金额候选行。可以保留多个 page=...，方便确认字段来自哪个页面；不要贴完整 HTML、完整 Vuex、cookie、token、手机号或完整户号。
      placeholder: |
        开启方式：
        SGCC_MONEY_DIAG=true
        SGCC_MONEY_DIAG_LIMIT=80

        请贴这些行：
        Path B 金额诊断摘要: page=..., url=..., account=*********xxxx, parsed_balance=..., parsed_prepay=..., parsed_arrears=..., candidates=...
        Path B 金额候选[1]: category=account_balance, source=store.state.userAcc.accountBalance, key=accountBalance, value=86.44, time=..., period=..., account=*********xxxx
        Path B 金额候选[2]: category=prepay_balance, source=..., key=..., value=..., time=..., period=..., account=*********xxxx
        Path B 金额候选[3]: category=arrears_due, source=..., key=..., value=..., time=..., period=..., account=*********xxxx

        同时给人工对照：
        网页显示：账户余额=xx 元，截至时间=yyyy-mm-dd hh:mm:ss
        程序显示：余额=xx/None，预付费余额=xx/None，应交金额=xx/None
      render: text
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请贴关键日志，不要贴密钥和完整账号。Docker 可用 docker compose logs --since=60m sgcc_electricity_app；Add-on 可在 HA Supervisor 日志页复制。金额类问题请优先填写上面的金额/余额诊断日志。
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: 脱敏后的关键配置
      description: 例如 SGCC_BROWSER_MODE、LOGIN_FALLBACK、LLM_BASE_URL、LLM_MODEL、MQTT_HOST、MQTT_DISCOVERY_PREFIX、JOB_START_TIME、SGCC_MONEY_DIAG、SGCC_MONEY_DIAG_LIMIT。不要贴密码/token/key。
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经确认日志和截图中没有手机号、密码、户号全量、token、API Key、MQTT 密码等敏感信息。
          required: true
        - label: 如果是国网数据问题，我已经确认手动登录 95598/网上国网页面时能看到对应数据。
          required: false
        - label: 如果是金额字段问题，我已经贴出 SGCC_MONEY_DIAG=true 生成的 Path B 金额诊断摘要和金额候选行，或说明当前版本没有该开关。
          required: false
        - label: 如果是 HA 实体问题，我已经尝试等待一次缓存重发布或重启 HA 后观察 retained MQTT 实体。
          required: false
