name: Bug 反馈 / 使用问题
description: 国网登录、验证码、数据抓取、MQTT、Home Assistant 实体等问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先确认：日志、截图、配置里不要包含手机号、密码、户号全量、HA Token、LLM API Key、MQTT 密码等敏感信息。
        金额/余额/预付费/欠费/账单金额问题优先提供结构化诊断日志，不需要贴网页 HTML 或让 AI 分析页面源码。

  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - Docker Compose / Docker CLI
        - Home Assistant Add-on
        - Home Assistant Container 外部容器
        - 其他
    validations:
      required: true

  - type: input
    id: project_version
    attributes:
      label: 项目版本 / 镜像 tag
      description: 例如 latest、main、sha-xxxxxxx、v0.1.4；如果不确定，请贴启动日志里的版本行。
      placeholder: latest
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant 版本与安装方式
      placeholder: Core 2026.6.3 / HAOS 18.0 / Container 等
    validations:
      required: false

  - type: dropdown
    id: problem_type
    attributes:
      label: 问题类型
      options:
        - 国网登录失败
        - 验证码 / LLM 识别失败
        - RK001 / 风控 / 页面打不开
        - 数据缺失或数据不更新
        - MQTT Discovery / HA 实体问题
        - Home Assistant Add-on 安装或启动问题
        - Docker 镜像 / 国内镜像问题
        - 其他
    validations:
      required: true

  - type: dropdown
    id: publisher
    attributes:
      label: PUBLISHER 配置
      options:
        - both
        - mqtt
        - rest
        - 不确定 / 未配置
    validations:
      required: true

  - type: dropdown
    id: browser_mode
    attributes:
      label: SGCC_BROWSER_MODE
      options:
        - browser-service
        - local
        - host-cdp / cdp
        - 不确定 / 未配置
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 你期望发生什么？
      description: 简单说你想看到的结果。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际发生了什么？
      description: 包括页面、实体、日志里的关键现象。请脱敏。
    validations:
      required: true

  - type: textarea
    id: data_scope
    attributes:
      label: 数据范围情况
      description: 如果是数据缺失，请说明余额、预付费余额、应交金额、日用电、月度、年度、峰平谷尖分别是否有数据；日/月数据最新到哪一天/哪一月。
      placeholder: |
        余额：有/无，页面显示 xx 元，程序显示 xx/None
        预付费余额：有/无，HA/MQTT 显示 xx/None
        应交金额/欠费：有/无，HA/MQTT 显示 xx/None
        日用电：最新到 2026-xx-xx
        月度：最新到 2026-xx
        年度：有/无
        峰平谷尖：有/无
    validations:
      required: false

  - type: textarea
    id: money_diag
    attributes:
      label: 金额/余额诊断日志
      description: 如果问题涉及余额、预付费、欠费、应交金额、出账金额或上月余额，请开启 SGCC_MONEY_DIAG=true 后贴 Path B 金额诊断摘要和金额候选行。不要贴完整 HTML、完整 Vuex、cookie、token、手机号或完整户号。
      placeholder: |
        开启方式：
        SGCC_MONEY_DIAG=true
        SGCC_MONEY_DIAG_LIMIT=80

        请贴这些行：
        Path B 金额诊断摘要: ...
        Path B 金额候选[1]: category=..., source=..., key=..., value=..., time=..., period=..., account=*********xxxx

        同时给人工对照：
        网页显示：账户余额=xx 元，截至时间=yyyy-mm-dd hh:mm:ss
        程序显示：余额=xx/None，预付费余额=xx/None，应交金额=xx/None
      render: text
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请贴关键日志，不要贴密钥和完整账号。Docker 可用 docker compose logs --since=60m sgcc_electricity_app；Add-on 可在 HA Supervisor 日志页复制。金额类问题请优先填写上面的金额/余额诊断日志。
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: 脱敏后的关键配置
      description: 例如 SGCC_BROWSER_MODE、LOGIN_FALLBACK、LLM_BASE_URL、LLM_MODEL、MQTT_HOST、MQTT_DISCOVERY_PREFIX、JOB_START_TIME、SGCC_MONEY_DIAG。不要贴密码/token/key。
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经确认日志和截图中没有手机号、密码、户号全量、token、API Key、MQTT 密码等敏感信息。
          required: true
        - label: 如果是国网数据问题，我已经确认手动登录 95598/网上国网页面时能看到对应数据。
          required: false
        - label: 如果是 HA 实体问题，我已经尝试等待一次缓存重发布或重启 HA 后观察 retained MQTT 实体。
          required: false
