name: Bug 反馈 / 使用问题
description: 国网登录、验证码、数据抓取、MQTT、Home Assistant 实体等问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先确认：日志、截图、配置里不要包含手机号、密码、户号全量、HA Token、LLM API Key、MQTT 密码等敏感信息。
        数据抓取、金额/余额/预付费/欠费/账单金额、用电范围和发布问题优先提供 `SGCC_DEBUG=true` 生成的脱敏 Debug bundle；它包含 Network/Vuex/Component/DOM、结构指纹和 parser decision，网页 HTML 和页面源码分析可省略。
        同一个 issue 里如果有多位用户补充，请分别说明自己的省份、用电/计费类型和诊断日志；不同省份或不同页面字段可能不是同一个问题。

  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - Docker Compose / Docker CLI
        - Home Assistant Add-on
        - Home Assistant Container 外部容器
        - 其他
    validations:
      required: true

  - type: input
    id: project_version
    attributes:
      label: 项目版本 / 镜像 tag
      description: 例如 latest、main、sha-xxxxxxx、v0.1.4；如果不确定，请贴启动日志里的版本行。
      placeholder: latest
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant 版本与安装方式
      placeholder: Core 2026.6.3 / HAOS 18.0 / Container 等
    validations:
      required: false

  - type: dropdown
    id: problem_type
    attributes:
      label: 问题类型
      options:
        - 国网登录失败
        - 验证码 / LLM 识别失败
        - RK001 / 风控 / 页面打不开
        - 金额 / 余额 / 预付费 / 欠费字段解析
        - 数据缺失或数据不更新
        - 日 / 月 / 年用电量字段解析
        - MQTT Discovery / HA 实体问题
        - Home Assistant Add-on 安装或启动问题
        - Docker 镜像 / 国内镜像问题
        - 其他
    validations:
      required: true

  - type: input
    id: province_account_type
    attributes:
      label: 省份与用电 / 计费类型
      description: 不需要完整地址或完整户号；金额字段常按省份、预付费、出账后缴费、居民/工商业等口径变化。
      placeholder: 例如：福建 / 居民 / 预付费；或 浙江 / 居民 / 出账后缴费
    validations:
      required: false

  - type: dropdown
    id: publisher
    attributes:
      label: PUBLISHER 配置
      options:
        - both
        - mqtt
        - rest
        - 不确定 / 未配置
    validations:
      required: true

  - type: dropdown
    id: browser_mode
    attributes:
      label: SGCC_BROWSER_MODE
      options:
        - browser-service
        - local
        - host-cdp / cdp
        - 不确定 / 未配置
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 你期望发生什么？
      description: 简单说你想看到的结果。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际发生了什么？
      description: 包括页面、实体、日志里的关键现象。请脱敏。
    validations:
      required: true

  - type: textarea
    id: data_scope
    attributes:
      label: 数据范围与人工对照
      description: 如果是数据缺失或金额不一致，请逐项说明网页显示、程序显示和最新时间；金额类问题请保留“当前余额、预付费余额、应交/欠费、出账金额、上期/上月余额”的区别。
      placeholder: |
        网页入口：95598 / 网上国网；页面名称：账户余额 / 电费账单 / 日用电量 / 月用电量 / 其他
        当前账户余额：网页显示 xx 元，程序 balance 显示 xx/None
        预付费余额：有/无，HA/MQTT 显示 xx/None
        应交金额/欠费：网页显示 xx 元，程序 arrears 显示 xx/None
        出账金额/本期电费：网页显示 xx 元，程序显示 xx/None
        上期/上月余额：网页显示 xx 元，程序 prepay_balance/balance 显示 xx/None
        截至时间 / 查询时间：2026-xx-xx xx:xx:xx
        日用电：最新到 2026-xx-xx
        月度：最新到 2026-xx
        年度：有/无
        峰平谷尖：有/无
    validations:
      required: false

  - type: textarea
    id: diag_summary
    attributes:
      label: SGCC_DEBUG 摘要 / Debug bundle
      description: 开启 SGCC_DEBUG=true 后重新运行一次，粘贴摘要并优先附上 /data/debug/latest/sgcc-debug-bundle.zip。提交前仍请检查包内没有账号、密码、token、手机号和完整户号。
      placeholder: |
        开启方式：
        SGCC_DEBUG=true

        运行一次后请粘贴日志里的完整摘要块：
        ========== SGCC DIAG SUMMARY START ==========
        status=...
        run_id=...
        trigger_type=...
        session=...
        scrape=selector_options=..., fetched=..., saved=..., skipped=...
        account[1]=event=..., account=*********xxxx, balance=..., daily=..., monthly=..., yearly=...
        page[1]=label=..., url=..., account=*********xxxx, money_candidates=..., fields=...
        publish=publisher=..., account=*********xxxx, success=..., detail=...
        error=stage=..., type=..., message=...
        ========== SGCC DIAG SUMMARY END ==========

        可选附件/补充：
        /data/diag/latest/summary.txt
        /data/diag/latest/summary.json
        /data/diag/latest/fields.redacted.json

        如果当前环境暂未提供诊断，请说明原因和已尝试的版本。
      render: text
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请贴关键日志，不要贴密钥和完整账号。Docker 可用 docker compose logs --since=60m sgcc_electricity_app；Add-on 可在 HA Supervisor 日志页复制。数据类问题请优先填写上面的 SGCC_DEBUG 摘要。
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: 脱敏后的关键配置
      description: 例如 SGCC_BROWSER_MODE、LOGIN_FALLBACK、LLM_BASE_URL、LLM_MODEL、MQTT_HOST、MQTT_DISCOVERY_PREFIX、JOB_START_TIME、SGCC_DEBUG、SGCC_DEBUG_DIR。密码/token/key 请用遮罩值。
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经确认日志和截图中没有手机号、密码、户号全量、token、API Key、MQTT 密码等敏感信息。
          required: true
        - label: 如果是国网数据问题，我已经确认手动登录 95598/网上国网页面时能看到对应数据。
          required: false
        - label: 如果是国网数据、金额字段或发布问题，我已经提供 SGCC_DEBUG=true 生成的摘要/脱敏 bundle，或说明当前环境暂未提供的原因。
          required: false
        - label: 如果是 HA 实体问题，我已经尝试等待一次缓存重发布或重启 HA 后观察 retained MQTT 实体。
          required: false
