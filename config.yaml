name: "SGCC Home Assistant Bridge"
version: "v0.1.1"
slug: "sgcc_home_assistant_bridge"
description: "国家电网 / SGCC / 95598 电费与用电数据 Home Assistant 桥接插件"
url: "https://github.com/MaribelHearm/sgcc-home-assistant-bridg"
arch:
  - amd64
host_network: true
startup: application
boot: auto
init: false
stage: experimental
legacy: true
image: "ghcr.io/maribelhearm/sgcc-home-assistant-bridge"
map:
  # - addons:rw
  - config:rw
  # - media:rw
  - type: data
    read_only: False
options:
  PHONE_NUMBER: ""
  PASSWORD: ""
  IGNORE_USER_ID: ""
  HASS_URL: "http://homeassistant.local:8123"
  HASS_TOKEN: ""
  JOB_START_TIME: "07:00"
  SGCC_DAILY_RUNS: 1
  RETRY_TIMES_LIMIT: 5
  RISK_COOLDOWN_MINUTES: 60
  SGCC_LOGIN_COOLDOWN_ENABLED: true
  SGCC_QRCODE_FALLBACK_UNATTENDED: false
  RETRY_WAIT_TIME_OFFSET_UNIT: 10
  DRIVER_IMPLICITY_WAIT_TIME: 60
  PAGE_LOAD_TIMEOUT: 45
  LLM_API_KEY: ""
  LLM_BASE_URL: "https://ark.cn-beijing.volces.com/api/v3"
  LLM_MODEL: "doubao-seed-2-0-pro-260215"
  ARK_API_KEY: ""
  ARK_BASE_URL: ""
  ARK_MODEL: ""
  LOGIN_FALLBACK: "qrcode"
  PUBLISHER: "both"
  MQTT_HOST: "127.0.0.1"
  MQTT_PORT: 1883
  MQTT_USERNAME: ""
  MQTT_PASSWORD: ""
  MQTT_DISCOVERY_PREFIX: "homeassistant"
  SGCC_DB_PATH: "/data/sgcc.sqlite3"
  SCRAPER_SETTLE_SECONDS: 3.0
  REPUBLISH_INTERVAL_MINUTES: 15
  SGCC_BROWSER_PROFILE: "/data/chrome-profile"
schema:
  PHONE_NUMBER: str
  PASSWORD: password
  IGNORE_USER_ID: str?
  HASS_URL: url
  HASS_TOKEN: str?
  JOB_START_TIME: str
  SGCC_DAILY_RUNS: int(1,2)
  RETRY_TIMES_LIMIT: int(1,20)
  RISK_COOLDOWN_MINUTES: int(1,1440)
  SGCC_LOGIN_COOLDOWN_ENABLED: bool
  SGCC_QRCODE_FALLBACK_UNATTENDED: bool
  RETRY_WAIT_TIME_OFFSET_UNIT: int(2,60)
  DRIVER_IMPLICITY_WAIT_TIME: int(5,180)
  PAGE_LOAD_TIMEOUT: int(10,180)
  LLM_API_KEY: password?
  LLM_BASE_URL: str?
  LLM_MODEL: str?
  ARK_API_KEY: password?
  ARK_BASE_URL: str?
  ARK_MODEL: str?
  LOGIN_FALLBACK: str?
  PUBLISHER: str
  MQTT_HOST: str?
  MQTT_PORT: port
  MQTT_USERNAME: str?
  MQTT_PASSWORD: password?
  MQTT_DISCOVERY_PREFIX: str
  SGCC_DB_PATH: str
  SCRAPER_SETTLE_SECONDS: float(0,30)
  REPUBLISH_INTERVAL_MINUTES: int(1,1440)
  SGCC_BROWSER_PROFILE: str
