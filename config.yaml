name: "SGCC Home Assistant Bridge"
version: "v0.1.8"
slug: "sgcc_home_assistant_bridge"
description: "国家电网 / SGCC / 95598 电费与用电数据 Home Assistant 桥接插件"
url: "https://github.com/MaribelHearm/sgcc-home-assistant-bridg"
arch:
  - amd64
host_network: true
startup: application
boot: auto
init: false
stage: experimental
legacy: true
image: "ghcr.io/maribelhearm/sgcc-home-assistant-bridge"
map:
  # - addons:rw
  - config:rw
  # - media:rw
  - type: data
    read_only: False
options:
  PHONE_NUMBER: ""
  PASSWORD: ""
  IGNORE_USER_ID: ""
  HASS_URL: "http://homeassistant.local:8123"
  HASS_TOKEN: ""
  JOB_START_TIME: "07:00"
  SGCC_DAILY_JITTER_MINUTES: 10
  SGCC_DAILY_RUNS: 1
  RETRY_TIMES_LIMIT: 5
  RISK_COOLDOWN_MINUTES: 60
  SGCC_LOGIN_COOLDOWN_ENABLED: true
  SGCC_RISK_FALLBACK_OVERRIDE: false
  SGCC_LOGIN_FALLBACK_UNATTENDED: false
  SGCC_QRCODE_FALLBACK_UNATTENDED: false
  SGCC_LOGIN_FALLBACK_METHODS: ""
  SGCC_LOGIN_INTERACTION_PROVIDER: "auto"
  SGCC_TELEGRAM_BOT_TOKEN: ""
  SGCC_TELEGRAM_CHAT_ID: ""
  SGCC_TELEGRAM_API_BASE_URL: "https://api.telegram.org"
  SGCC_SMS_CODE_TIMEOUT_SECONDS: 180
  RETRY_WAIT_TIME_OFFSET_UNIT: 10
  DRIVER_IMPLICITY_WAIT_TIME: 60
  PAGE_LOAD_TIMEOUT: 45
  LLM_API_KEY: ""
  LLM_BASE_URL: "https://ark.cn-beijing.volces.com/api/v3"
  LLM_MODEL: "doubao-seed-2-0-pro-260215"
  ARK_API_KEY: ""
  ARK_BASE_URL: ""
  ARK_MODEL: ""
  LOGIN_FALLBACK: "qrcode"
  PUBLISHER: "mqtt"
  MQTT_HOST: "127.0.0.1"
  MQTT_PORT: 1883
  MQTT_USERNAME: ""
  MQTT_PASSWORD: ""
  MQTT_DISCOVERY_PREFIX: "homeassistant"
  MQTT_LEGACY_DISCOVERY_MODE: "compat"
  SGCC_DB_PATH: "/data/sgcc.sqlite3"
  SCRAPER_SETTLE_SECONDS: 3.0
  SGCC_DEBUG: false
  SGCC_DEBUG_DIR: "/data/debug"
  SGCC_DIAG: false
  SGCC_DIAG_DIR: "/data/diag"
  SGCC_LOGIN_METHOD: "password"
  REPUBLISH_INTERVAL_MINUTES: 15
  SGCC_BROWSER_MODE: "browser-service"
  SGCC_CDP_ADDRESS: "127.0.0.1:19222"
  SGCC_BROWSER_SERVICE_URL: "http://127.0.0.1:39222"
  SGCC_BROWSER_SERVICE_STOP_ON_RELEASE: true
  SGCC_BROWSER_SERVICE_PROFILE: "/data/sgcc-browser-profile"
  SGCC_BROWSER_PROFILE: "/data/chrome-profile"
schema:
  PHONE_NUMBER: str
  PASSWORD: password
  IGNORE_USER_ID: str?
  HASS_URL: url
  HASS_TOKEN: str?
  JOB_START_TIME: str
  SGCC_DAILY_JITTER_MINUTES: int(0,180)
  SGCC_DAILY_RUNS: int(1,2)
  RETRY_TIMES_LIMIT: int(1,20)
  RISK_COOLDOWN_MINUTES: int(1,1440)
  SGCC_LOGIN_COOLDOWN_ENABLED: bool
  SGCC_RISK_FALLBACK_OVERRIDE: bool
  SGCC_LOGIN_FALLBACK_UNATTENDED: bool
  SGCC_QRCODE_FALLBACK_UNATTENDED: bool
  SGCC_LOGIN_FALLBACK_METHODS: str
  SGCC_LOGIN_INTERACTION_PROVIDER: "list(auto|telegram|url|both|none)"
  SGCC_TELEGRAM_BOT_TOKEN: password?
  SGCC_TELEGRAM_CHAT_ID: str?
  SGCC_TELEGRAM_API_BASE_URL: str
  SGCC_SMS_CODE_TIMEOUT_SECONDS: int(30,600)
  RETRY_WAIT_TIME_OFFSET_UNIT: int(2,60)
  DRIVER_IMPLICITY_WAIT_TIME: int(5,180)
  PAGE_LOAD_TIMEOUT: int(10,180)
  LLM_API_KEY: password?
  LLM_BASE_URL: str?
  LLM_MODEL: str?
  ARK_API_KEY: password?
  ARK_BASE_URL: str?
  ARK_MODEL: str?
  LOGIN_FALLBACK: str?
  PUBLISHER: str
  MQTT_HOST: str?
  MQTT_PORT: port
  MQTT_USERNAME: str?
  MQTT_PASSWORD: password?
  MQTT_DISCOVERY_PREFIX: str
  MQTT_LEGACY_DISCOVERY_MODE: "list(compat|off|cleanup)"
  SGCC_DB_PATH: str
  SCRAPER_SETTLE_SECONDS: float(0,30)
  SGCC_DEBUG: bool
  SGCC_DEBUG_DIR: str
  SGCC_DIAG: bool
  SGCC_DIAG_DIR: str
  SGCC_LOGIN_METHOD: "list(password|phone-code)"
  REPUBLISH_INTERVAL_MINUTES: int(1,1440)
  SGCC_BROWSER_MODE: "list(browser-service|local|host-cdp|cdp)"
  SGCC_CDP_ADDRESS: str
  SGCC_BROWSER_SERVICE_URL: str
  SGCC_BROWSER_SERVICE_STOP_ON_RELEASE: bool
  SGCC_BROWSER_SERVICE_PROFILE: str
  SGCC_BROWSER_PROFILE: str
